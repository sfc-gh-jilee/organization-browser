<!DOCTYPE html>
<html lang="en" class="lightMode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../tokens/stellar-tokens.css">
  <link rel="stylesheet" href="menu.css">
  <link rel="stylesheet" href="../button/button.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      line-height: 1.15;
      -webkit-text-size-adjust: 100%;
      font-family: Inter, Roboto, "Helvetica Neue", "Arial Nova", "Nimbus Sans", Arial, sans-serif;
    }
    body { background: var(--themed-surface-level-1-background); color: var(--themed-reusable-text-primary); -webkit-font-smoothing: antialiased; }
  </style>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'dark') {
        document.documentElement.classList.replace('lightMode', 'darkMode');
      }
    })();
  </script>
</head>
<body>
  <div data-component="menu" style="padding: 40px; display: flex; flex-direction: column; gap: 32px; min-height: 100vh; align-items: flex-start;">

    <!-- Basic menu -->
    <div style="margin-bottom: 220px;">
      <span style="font-size: 11px; color: rgb(136, 136, 136); font-family: monospace; display: block; margin-bottom: 8px;">
        basic / default items
      </span>
      <div class="stellar-menu-trigger">
        <button role="button" class="stellar-button stellar-button--secondary" data-menu-trigger>Actions</button>
        <div class="stellar-menu" role="dialog">
          <div class="stellar-menu__list" role="menu" tabindex="0">
            <div class="stellar-menu__item" role="menuitem" data-key="edit">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Edit</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="copy">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Copy</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="delete">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Delete</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- With icons -->
    <div style="margin-bottom: 260px;">
      <span style="font-size: 11px; color: rgb(136, 136, 136); font-family: monospace; display: block; margin-bottom: 8px;">
        with prefix icons
      </span>
      <div class="stellar-menu-trigger">
        <button role="button" class="stellar-button stellar-button--secondary" data-menu-trigger>With Icons</button>
        <div class="stellar-menu" role="dialog">
          <div class="stellar-menu__list" role="menu" tabindex="0">
            <div class="stellar-menu__item" role="menuitem" data-key="edit">
              <div class="stellar-menu__item-label" tabindex="0">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M9.916 2.378a1.5 1.5 0 0 1 2.156.038l1.634 1.749a1.5 1.5 0 0 1-.035 2.084l-6.595 6.594a1.5 1.5 0 0 1-.796.416l-3.523.633a.502.502 0 0 1-.578-.596l.771-3.61a1.5 1.5 0 0 1 .407-.748zM4.064 9.645a.5.5 0 0 0-.136.25l-.615 2.88 2.79-.5a.5.5 0 0 0 .266-.139l4.636-4.635-2.398-2.399zm7.278-6.547a.5.5 0 0 0-.719-.013l-1.31 1.31 2.4 2.399 1.251-1.252a.5.5 0 0 0 .012-.695z" clip-rule="evenodd"></path></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Edit</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="copy">
              <div class="stellar-menu__item-label" tabindex="0">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M10.5 2A1.5 1.5 0 0 1 12 3.5V5h.5A1.5 1.5 0 0 1 14 6.5v6a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 5 12.5V12H3.5A1.5 1.5 0 0 1 2 10.5v-7A1.5 1.5 0 0 1 3.5 2zm-4 4a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h6a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5zm-3-3a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H5V6.5A1.5 1.5 0 0 1 6.5 5H11V3.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Copy</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="download">
              <div class="stellar-menu__item-label" tabindex="0">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><g fill="currentColor"><path d="m8.5 12.292 2.146-2.146.707.706-3 3A.5.5 0 0 1 8 14a.5.5 0 0 1-.354-.148l-3-3 .708-.707L7.5 12.293V6.499h1z"></path><path d="M7.918 2.004a3.97 3.97 0 0 1 3.651 2.965A3.533 3.533 0 0 1 15 8.5l-.004.176A3.53 3.53 0 0 1 13 11.68v-1.166a2.53 2.53 0 0 0 .987-1.763L14 8.5c0-1.312-.997-2.39-2.274-2.52l-.26-.013q-.13 0-.253.012l-.479.047-.066-.475a2.97 2.97 0 0 0-2.66-2.538L7.732 3a2.967 2.967 0 0 0-2.966 2.967l.004.163q.004.08.012.158l.064.594-.596-.041a2 2 0 0 0-.15-.008 2.1 2.1 0 0 0-2.1 2.1l.01.215A2.1 2.1 0 0 0 3 10.722v1.107a3.1 3.1 0 0 1-1.996-2.736L1 8.933a3.1 3.1 0 0 1 2.767-3.082A3.967 3.967 0 0 1 7.73 2z"></path></g></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Download</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__divider" role="separator"></div>
            <div class="stellar-menu__item" role="menuitem" data-key="delete">
              <div class="stellar-menu__item-label" tabindex="0">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><g fill="currentColor"><path d="M7 11H6V7h1zm3 0H9V7h1z"></path><path fill-rule="evenodd" d="M9.5 2A1.5 1.5 0 0 1 11 3.5V4h3v1h-1.027l-.421 7.583A1.5 1.5 0 0 1 11.054 14H4.946a1.5 1.5 0 0 1-1.498-1.417L3.028 5H2V4h3v-.5A1.5 1.5 0 0 1 6.5 2zM4.446 12.527a.5.5 0 0 0 .5.473h6.108a.5.5 0 0 0 .5-.473L11.972 5H4.028zM6.5 3a.5.5 0 0 0-.5.5V4h4v-.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Delete</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- With sections -->
    <div style="margin-bottom: 320px;">
      <span style="font-size: 11px; color: rgb(136, 136, 136); font-family: monospace; display: block; margin-bottom: 8px;">
        with sections
      </span>
      <div class="stellar-menu-trigger">
        <button role="button" class="stellar-button stellar-button--secondary" data-menu-trigger>Sections</button>
        <div class="stellar-menu" role="dialog">
          <div class="stellar-menu__list" role="menu" tabindex="0">
            <div class="stellar-menu__section" role="group">
              <div class="stellar-menu__section-header">Actions</div>
              <div class="stellar-menu__item" role="menuitem" data-key="edit">
                <div class="stellar-menu__item-label" tabindex="0">
                  <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M9.916 2.378a1.5 1.5 0 0 1 2.156.038l1.634 1.749a1.5 1.5 0 0 1-.035 2.084l-6.595 6.594a1.5 1.5 0 0 1-.796.416l-3.523.633a.502.502 0 0 1-.578-.596l.771-3.61a1.5 1.5 0 0 1 .407-.748zM4.064 9.645a.5.5 0 0 0-.136.25l-.615 2.88 2.79-.5a.5.5 0 0 0 .266-.139l4.636-4.635-2.398-2.399zm7.278-6.547a.5.5 0 0 0-.719-.013l-1.31 1.31 2.4 2.399 1.251-1.252a.5.5 0 0 0 .012-.695z" clip-rule="evenodd"></path></g></svg>
                  <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                    <span class="stellar-menu__item-text">Edit</span>
                  </div>
                </div>
              </div>
              <div class="stellar-menu__item" role="menuitem" data-key="copy">
                <div class="stellar-menu__item-label" tabindex="0">
                  <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M10.5 2A1.5 1.5 0 0 1 12 3.5V5h.5A1.5 1.5 0 0 1 14 6.5v6a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 5 12.5V12H3.5A1.5 1.5 0 0 1 2 10.5v-7A1.5 1.5 0 0 1 3.5 2zm-4 4a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h6a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5zm-3-3a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H5V6.5A1.5 1.5 0 0 1 6.5 5H11V3.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></svg>
                  <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                    <span class="stellar-menu__item-text">Copy</span>
                  </div>
                </div>
              </div>
            </div>
            <div class="stellar-menu__section" role="group">
              <div class="stellar-menu__section-header">Danger zone</div>
              <div class="stellar-menu__item" role="menuitem" data-key="delete">
                <div class="stellar-menu__item-label" tabindex="0">
                  <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><g fill="currentColor"><path d="M7 11H6V7h1zm3 0H9V7h1z"></path><path fill-rule="evenodd" d="M9.5 2A1.5 1.5 0 0 1 11 3.5V4h3v1h-1.027l-.421 7.583A1.5 1.5 0 0 1 11.054 14H4.946a1.5 1.5 0 0 1-1.498-1.417L3.028 5H2V4h3v-.5A1.5 1.5 0 0 1 6.5 2zM4.446 12.527a.5.5 0 0 0 .5.473h6.108a.5.5 0 0 0 .5-.473L11.972 5H4.028zM6.5 3a.5.5 0 0 0-.5.5V4h4v-.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></g></svg>
                  <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                    <span class="stellar-menu__item-text">Delete</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- With disabled items -->
    <div style="margin-bottom: 220px;">
      <span style="font-size: 11px; color: rgb(136, 136, 136); font-family: monospace; display: block; margin-bottom: 8px;">
        with disabled items
      </span>
      <div class="stellar-menu-trigger">
        <button role="button" class="stellar-button stellar-button--secondary" data-menu-trigger>Disabled Items</button>
        <div class="stellar-menu" role="dialog">
          <div class="stellar-menu__list" role="menu" tabindex="0">
            <div class="stellar-menu__item" role="menuitem" data-key="edit">
              <div class="stellar-menu__item-label" tabindex="0">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M9.916 2.378a1.5 1.5 0 0 1 2.156.038l1.634 1.749a1.5 1.5 0 0 1-.035 2.084l-6.595 6.594a1.5 1.5 0 0 1-.796.416l-3.523.633a.502.502 0 0 1-.578-.596l.771-3.61a1.5 1.5 0 0 1 .407-.748zM4.064 9.645a.5.5 0 0 0-.136.25l-.615 2.88 2.79-.5a.5.5 0 0 0 .266-.139l4.636-4.635-2.398-2.399zm7.278-6.547a.5.5 0 0 0-.719-.013l-1.31 1.31 2.4 2.399 1.251-1.252a.5.5 0 0 0 .012-.695z" clip-rule="evenodd"></path></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Edit</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item stellar-menu__item--disabled" role="menuitem" aria-disabled="true" data-key="copy">
              <div class="stellar-menu__item-label" tabindex="-1">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><path fill="currentColor" fill-rule="evenodd" d="M10.5 2A1.5 1.5 0 0 1 12 3.5V5h.5A1.5 1.5 0 0 1 14 6.5v6a1.5 1.5 0 0 1-1.5 1.5h-6A1.5 1.5 0 0 1 5 12.5V12H3.5A1.5 1.5 0 0 1 2 10.5v-7A1.5 1.5 0 0 1 3.5 2zm-4 4a.5.5 0 0 0-.5.5v6a.5.5 0 0 0 .5.5h6a.5.5 0 0 0 .5-.5v-6a.5.5 0 0 0-.5-.5zm-3-3a.5.5 0 0 0-.5.5v7a.5.5 0 0 0 .5.5H5V6.5A1.5 1.5 0 0 1 6.5 5H11V3.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Copy</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item stellar-menu__item--disabled" role="menuitem" aria-disabled="true" data-key="delete">
              <div class="stellar-menu__item-label" tabindex="-1">
                <svg class="stellar-menu__item-icon" viewBox="0 0 16 16" role="presentation" aria-hidden="true" fill="none" stroke="none" xmlns="http://www.w3.org/2000/svg"><g><g fill="currentColor"><path d="M7 11H6V7h1zm3 0H9V7h1z"></path><path fill-rule="evenodd" d="M9.5 2A1.5 1.5 0 0 1 11 3.5V4h3v1h-1.027l-.421 7.583A1.5 1.5 0 0 1 11.054 14H4.946a1.5 1.5 0 0 1-1.498-1.417L3.028 5H2V4h3v-.5A1.5 1.5 0 0 1 6.5 2zM4.446 12.527a.5.5 0 0 0 .5.473h6.108a.5.5 0 0 0 .5-.473L11.972 5H4.028zM6.5 3a.5.5 0 0 0-.5.5V4h4v-.5a.5.5 0 0 0-.5-.5z" clip-rule="evenodd"></path></g></g></svg>
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Delete</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Icon button trigger (closed) -->
    <div>
      <span style="font-size: 11px; color: rgb(136, 136, 136); font-family: monospace; display: block; margin-bottom: 8px;">
        icon button trigger (closed)
      </span>
      <div class="stellar-menu-trigger">
        <button role="button" class="stellar-button stellar-button--tertiary" data-menu-trigger>&#x2026;</button>
        <div class="stellar-menu" role="dialog">
          <div class="stellar-menu__list" role="menu" tabindex="0">
            <div class="stellar-menu__item" role="menuitem" data-key="edit">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Edit</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="copy">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Copy</span>
                </div>
              </div>
            </div>
            <div class="stellar-menu__item" role="menuitem" data-key="delete">
              <div class="stellar-menu__item-label" tabindex="0">
                <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px;">
                  <span class="stellar-menu__item-text">Delete</span>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
  <script src="menu.js"></script>
</body>
</html>
