<!DOCTYPE html>
<html lang="en" class="lightMode">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Organization Browser</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dist/stellar.css">
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div style="display:flex; height:100vh;">
    <!-- GlobalNav sidebar -->
    <aside
      data-component="globalnav"
      data-active="admin"
      data-collapsed="true"
      data-user='{"name":"Admin User","role":"ORGADMIN","hasNotifications":false}'
    ></aside>

    <!-- Main content -->
    <div class="main-content">
      <!-- Breadcrumb -->
      <div class="breadcrumb">
        <span class="stellar-span stellar-type-small-paragraph stellar-text--secondary">London Stock Exchange Group</span>
        <svg viewBox="0 0 16 16" width="12" height="12" fill="none" aria-hidden="true" style="color:var(--themed-reusable-text-secondary);">
          <path fill="currentColor" d="m5.854 2.646 5 5a.5.5 0 0 1 0 .708l-5 5-.708-.707L9.793 8 5.146 3.354z"/>
        </svg>
        <span class="stellar-span stellar-type-small-paragraph" style="color:var(--themed-reusable-text-primary); font-weight:400;">Org Users and User Groups</span>
      </div>

      <!-- Page header -->
      <div class="page-header">
        <h1 class="stellar-heading stellar-type-page-header" style="margin:0;">Organization users and user groups</h1>

      </div>

      <!-- Control bar -->
      <div class="control-bar" id="controlBar">
        <div class="control-bar__left">
          <div class="stellar-textinput">
            <svg class="stellar-textinput__icon" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path fill="currentColor" fill-rule="evenodd" d="M7 2a5 5 0 0 1 3.871 8.164l3.983 3.983-.707.707-3.983-3.983A5 5 0 1 1 7 2m0 1a4 4 0 1 0 0 8 4 4 0 0 0 0-8" clip-rule="evenodd"/>
            </svg>
            <input class="stellar-textinput__input" type="text" placeholder="Search" id="globalSearch">
          </div>
        </div>
        <div class="control-bar__center" id="selectionActions" style="display:none;">
          <button class="selection-pill" id="selectionPill">
            <span id="selectionCount">0</span> selected
            <svg viewBox="0 0 16 16" width="14" height="14" fill="none" aria-hidden="true" class="selection-pill__clear">
              <path fill="currentColor" d="m13.354 3.366-4.642 4.64 4.634 4.635-.708.707-4.633-4.633-4.633 4.633-.707-.707 4.633-4.633-4.642-4.642.707-.707L8.005 7.3l4.641-4.64z"/>
            </svg>
          </button>
          <span class="relation-counts" id="relationCounts"></span>
        </div>
        <div class="control-bar__right">
          <div class="col-visibility-trigger" id="colVisibilityTrigger">
            <button class="stellar-button stellar-button--secondary stellar-button--icon-only" title="Toggle columns" aria-label="Toggle columns" id="colVisibilityBtn">
              <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                <rect x="1" y="2" width="3.5" height="12" rx="1" stroke="currentColor" stroke-width="1" fill="none"/>
                <rect x="6.25" y="2" width="3.5" height="12" rx="1" stroke="currentColor" stroke-width="1" fill="none"/>
                <rect x="11.5" y="2" width="3.5" height="12" rx="1" stroke="currentColor" stroke-width="1" fill="none"/>
              </svg>
            </button>
            <div class="col-visibility-menu" id="colVisibilityMenu">
              <label class="col-visibility-menu__item" data-col-toggle="accounts">
                <input type="checkbox" checked /> Accounts
              </label>
              <label class="col-visibility-menu__item" data-col-toggle="userGroups">
                <input type="checkbox" checked /> Org user groups
              </label>
              <label class="col-visibility-menu__item" data-col-toggle="users">
                <input type="checkbox" checked /> Org users
              </label>
            </div>
          </div>
          <div class="stellar-splitbutton stellar-splitbutton--primary" id="createButton" style="position:relative;">
            <button class="stellar-splitbutton__action">
              Create Org user
            </button>
            <button class="stellar-splitbutton__trigger" data-menu-trigger>
              <svg class="stellar-splitbutton__trigger-icon" viewBox="0 0 16 16" aria-hidden="true" fill="none">
                <path fill="currentColor" d="m8 10.5-4-5h8z"/>
              </svg>
            </button>
            <div class="stellar-menu" role="dialog">
              <div class="stellar-menu__list" role="menu" tabindex="0">
                <div class="stellar-menu__item" role="menuitem" data-key="create-user">
                  <div class="stellar-menu__item-label" tabindex="0">
                    <div style="flex-grow:1; min-width:0; display:flex; flex-direction:column; gap:2px">
                      <span class="stellar-menu__item-text">Create Org user</span>
                    </div>
                  </div>
                </div>
                <div class="stellar-menu__item" role="menuitem" data-key="create-group">
                  <div class="stellar-menu__item-label" tabindex="0">
                    <div style="flex-grow:1; min-width:0; display:flex; flex-direction:column; gap:2px">
                      <span class="stellar-menu__item-text">Create User group</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="actionButtons" style="display:none;"></div>
        </div>
      </div>

      <!-- Three-column layout -->
      <div class="columns-container">
        <!-- Accounts column -->
        <div class="column" id="col-accounts" data-column="accounts">
          <div class="column__header">
            <div class="column__header-left">
              <div class="column__search-wrap">
                <svg class="column__search-icon" viewBox="0 0 16 16" width="14" height="14" fill="none"><path fill="currentColor" fill-rule="evenodd" d="M7 2a5 5 0 0 1 3.871 8.164l3.983 3.983-.707.707-3.983-3.983A5 5 0 1 1 7 2m0 1a4 4 0 1 0 0 8 4 4 0 0 0 0-8" clip-rule="evenodd"/></svg>
                <input type="text" class="column__search" id="accounts-search" placeholder="Accounts (0)" autocomplete="off" />
              </div>
              <span class="column__count" id="accounts-count"></span>
            </div>
            <div class="column__header-right">
              <div class="filter-trigger">
                <button class="column__icon-btn" title="Filter" aria-label="Filter" id="accounts-filter-btn">
                  <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                    <path fill="currentColor" fill-rule="evenodd" d="M1.5 3h13v1.003L10 8.838V14l-4-2.5V8.838L1.5 4.003zm1.134 1L7 7.662v3.338l2 1.25V7.662L13.366 4z" clip-rule="evenodd"/>
                  </svg>
                </button>
                <div class="filter-menu" id="accounts-filter-menu"></div>
              </div>
            </div>
          </div>
          <div class="column__table-wrap">
            <div class="column__table-header" id="accounts-table-header"></div>
            <div class="column__body" id="accounts-scroll">
              <div class="virtual-spacer" id="accounts-spacer"></div>
              <div class="virtual-content" id="accounts-content"></div>
            </div>
          </div>
        </div>

        <!-- User Groups column -->
        <div class="column" id="col-usergroups" data-column="userGroups">
          <div class="column__header">
            <div class="column__header-left">
              <div class="column__search-wrap">
                <svg class="column__search-icon" viewBox="0 0 16 16" width="14" height="14" fill="none"><path fill="currentColor" fill-rule="evenodd" d="M7 2a5 5 0 0 1 3.871 8.164l3.983 3.983-.707.707-3.983-3.983A5 5 0 1 1 7 2m0 1a4 4 0 1 0 0 8 4 4 0 0 0 0-8" clip-rule="evenodd"/></svg>
                <input type="text" class="column__search" id="usergroups-search" placeholder="Org user groups (0)" autocomplete="off" />
              </div>
              <span class="column__count" id="usergroups-count"></span>
            </div>
            <div class="column__header-right">
              <button class="column__select-btn" id="usergroups-select-btn">Select unassigned</button>
              <div class="filter-trigger">
                <button class="column__icon-btn" title="Filter" aria-label="Filter" id="usergroups-filter-btn">
                  <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                    <path fill="currentColor" fill-rule="evenodd" d="M1.5 3h13v1.003L10 8.838V14l-4-2.5V8.838L1.5 4.003zm1.134 1L7 7.662v3.338l2 1.25V7.662L13.366 4z" clip-rule="evenodd"/>
                  </svg>
                </button>
                <div class="filter-menu" id="usergroups-filter-menu"></div>
              </div>
            </div>
          </div>
          <div class="column__table-wrap">
            <div class="column__table-header" id="usergroups-table-header"></div>
            <div class="column__body" id="usergroups-scroll">
              <div class="virtual-spacer" id="usergroups-spacer"></div>
              <div class="virtual-content" id="usergroups-content"></div>
            </div>
          </div>
        </div>

        <!-- Users column -->
        <div class="column column--active" id="col-users" data-column="users">
          <div class="column__header">
            <div class="column__header-left">
              <div class="column__search-wrap">
                <svg class="column__search-icon" viewBox="0 0 16 16" width="14" height="14" fill="none"><path fill="currentColor" fill-rule="evenodd" d="M7 2a5 5 0 0 1 3.871 8.164l3.983 3.983-.707.707-3.983-3.983A5 5 0 1 1 7 2m0 1a4 4 0 1 0 0 8 4 4 0 0 0 0-8" clip-rule="evenodd"/></svg>
                <input type="text" class="column__search" id="users-search" placeholder="Org users (0)" autocomplete="off" />
              </div>
              <span class="column__count" id="users-count"></span>
            </div>
            <div class="column__header-right">
              <button class="column__select-btn" id="users-select-btn">Select unassigned</button>
              <div class="filter-trigger">
                <button class="column__icon-btn" title="Filter" aria-label="Filter" id="users-filter-btn">
                  <svg viewBox="0 0 16 16" width="16" height="16" fill="none" aria-hidden="true">
                    <path fill="currentColor" fill-rule="evenodd" d="M1.5 3h13v1.003L10 8.838V14l-4-2.5V8.838L1.5 4.003zm1.134 1L7 7.662v3.338l2 1.25V7.662L13.366 4z" clip-rule="evenodd"/>
                  </svg>
                </button>
                <div class="filter-menu" id="users-filter-menu"></div>
              </div>
            </div>
          </div>
          <div class="column__table-wrap">
            <div class="column__table-header" id="users-table-header"></div>
            <div class="column__body" id="users-scroll">
              <div class="virtual-spacer" id="users-spacer"></div>
              <div class="virtual-content" id="users-content"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Side Panel (Cortex Code mock) -->
    <div class="side-panel" id="sidePanel">
      <div class="side-panel__resize-handle" id="sidePanelResize"></div>
      <div class="side-panel__img side-panel__img--top" style="background-image:url('coco-top.png')"></div>
      <div class="side-panel__img side-panel__img--center" style="background-image:url('coco-center.png')"></div>
      <div class="side-panel__img side-panel__img--bottom" style="background-image:url('coco-bottom.png')"></div>
    </div>
  </div>

  <!-- Hover popover -->
  <div id="itemPopover" class="item-popover" style="display:none;"></div>

  <!-- Inline item menu (shared, repositioned per click) -->
  <div id="itemInlineMenu" class="item-inline-menu"></div>

  <!-- Drag ghost template (hidden) -->
  <div id="dragGhost" class="drag-ghost" style="display:none;">
    <span class="drag-ghost__count"></span>
    <span class="drag-ghost__label"></span>
  </div>

  <script src="dist/stellar.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
